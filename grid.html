<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        #dv1{
            display: grid;           
            grid-template-columns: auto auto auto auto;
            background-color: blue;
            padding: 10px;
        }
        #dv1 div{
            margin: 5px;
            border: 1px solid #000;
            background-color: aliceblue;
            font-size: 30px;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div id="dv1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
</body>
</html>
